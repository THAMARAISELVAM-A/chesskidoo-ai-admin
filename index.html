<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Academy Admin Console</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Chess Academy Admin Console</h1>
        <div>
            <label>
                <input type="checkbox" id="theme-toggle"> Toggle Light/Dark Theme
            </label>
        </div>
    </header>
    <main>
        <section id="student-management">
            <h2>Student Management</h2>
            <div id="students-list">
                <!-- List of Indian students will be displayed here -->
            </div>
        </section>
        <section id="billing-dashboard">
            <h2>Billing Dashboard</h2>
            <div id="billing-summary">
                <!-- Billing summary will be displayed here -->
            </div>
        </section>
        <section id="ai-assistant">
            <h2>AI Assistant</h2>
            <div id="assistant-interface">
                <!-- AI assistant features will be here -->
            </div>
        </section>
        <section id="game-analyzer">
            <h2>Game Analyzer</h2>
            <div id="analyzing-tools">
                <!-- Game analysis tools will be here -->
            </div>
        </section>
        <section id="training-plans">
            <h2>Training Plans</h2>
            <div id="plans-list">
                <!-- Training plans will be listed here -->
            </div>
        </section>
    </main>
    <footer>
        <p>All rights reserved © Chess Academy</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
